name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is here as a DETECTOR, not a formality: it defaults text I/O to
        # the system locale (cp1252), which never raises — it silently mojibakes.
        # It also differs on path separators, case sensitivity, and SQLite locking.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (package + dev tools)
        # Dev tools are PINNED on purpose: unpinned, a new ruff/mypy release turns
        # main red on a commit that changed nothing. Bump these deliberately.
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff==0.16.0 pytest==9.1.1 mypy==2.3.0
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy repolens/
      - name: Test (pytest)
        run: pytest -q

      # The steps above use `pip install -e .` — an EDITABLE install, which points
      # Python at the source folder. That proves the CODE works here; it cannot
      # prove the built WHEEL does, because no wheel exists. This step closes that
      # gap: build the real artifact, install it into a clean venv, and run it.
      - name: Wheel builds, installs, and runs
        shell: bash # Windows runners default to PowerShell; force one syntax
        run: |
          set -euo pipefail
          python -m pip install --quiet build
          python -m build --wheel --outdir dist_check

          VENV="$PWD/.wheelenv"
          python -m venv "$VENV"
          # venv layout differs by platform: Scripts/ on Windows, bin/ elsewhere
          if [ "$RUNNER_OS" = "Windows" ]; then VBIN="$VENV/Scripts"; else VBIN="$VENV/bin"; fi
          "$VBIN/python" -m pip install --quiet dist_check/*.whl

          # Run from OUTSIDE the repo. Inside it, `import repolens` resolves to the
          # local source folder and the check would pass while proving nothing.
          cd "$RUNNER_TEMP"
          "$VBIN/python" -c "import repolens; print('import OK:', repolens.__version__)"
          "$VBIN/repolens" --version
