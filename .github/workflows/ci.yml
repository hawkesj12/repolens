name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is here as a DETECTOR, not a formality: it defaults text I/O to
        # the system locale (cp1252), which never raises — it silently mojibakes.
        # It also differs on path separators, case sensitivity, and SQLite locking.
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (package + dev tools)
        # Dev tools are PINNED on purpose: unpinned, a new ruff/mypy release turns
        # main red on a commit that changed nothing. Bump these deliberately.
        run: |
          python -m pip install --upgrade pip
          pip install -e . ruff==0.16.0 pytest==9.1.1 mypy==2.3.0
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy repolens/
      - name: Test (pytest)
        run: pytest -q

      # The steps above use `pip install -e .` — an EDITABLE install, which points
      # Python at the source folder. That proves the CODE works here; it cannot
      # prove the built WHEEL does, because no wheel exists. This step closes that
      # gap: build the real artifact, install it into a clean venv, and run it.
      - name: Wheel installs and works end-to-end
        shell: bash # Windows runners default to PowerShell; force one syntax
        run: |
          set -euo pipefail
          python -m pip install --quiet build
          python -m build --wheel --outdir dist_check

          VENV="$PWD/.wheelenv"
          python -m venv "$VENV"
          # venv layout differs by platform: Scripts/ on Windows, bin/ elsewhere
          if [ "$RUNNER_OS" = "Windows" ]; then VBIN="$VENV/Scripts"; else VBIN="$VENV/bin"; fi
          "$VBIN/python" -m pip install --quiet dist_check/*.whl

          # Run from OUTSIDE the repo. Inside it, `import repolens` resolves to the
          # local source folder and the check would pass while proving nothing.
          cd "$RUNNER_TEMP"
          "$VBIN/python" -c "import repolens; print('import OK:', repolens.__version__)"
          "$VBIN/repolens" --version

          # ── End-to-end: init a REAL git repo and use it ───────────────────
          # A real git repo on purpose. `_walk` filters against `git ls-files`
          # output, which is always forward-slashed — the bug where Windows
          # skipped every file and built an EMPTY index lives only on this path,
          # and the unit tests can't reach it because tmp_path isn't a git repo.
          # REPOLENS_MODEL_LOAD_TIMEOUT=1 forces lexical-only so CI doesn't
          # download an embedding model on every job (and exercises the
          # graceful-degrade path for free).
          export REPOLENS_MODEL_LOAD_TIMEOUT=1
          mkdir -p demo && cd demo
          git init -q && git config user.email ci@example.com && git config user.name ci
          mkdir -p docs
          printf '# Widget Guide\n\nHow to configure the widget — em-dash.\n' > docs/guide.md
          printf '"""Handles widget configuration."""\n' > widget.py

          "$VBIN/repolens" init

          test -s .claude/rules/repolens.md || { echo "FAIL: agent routing rule not written"; exit 1; }
          test -s .repolens.toml            || { echo "FAIL: .repolens.toml not written"; exit 1; }
          grep -q '\\' .repolens.toml       && { echo "FAIL: native separator in config"; exit 1; }
          grep -q '\.repolens/' .gitignore  || { echo "FAIL: .repolens/ not gitignored"; exit 1; }

          N=$("$VBIN/python" -c "import sqlite3;print(sqlite3.connect('.repolens/index.db').execute('SELECT count(*) FROM docs').fetchone()[0])")
          [ "$N" -ge 2 ] || { echo "FAIL: index has $N entries — gitignore allowlist mismatch"; exit 1; }

          "$VBIN/repolens" find "configure the widget" | grep -q 'docs/guide.md' \
            || { echo "FAIL: find did not locate docs/guide.md"; exit 1; }

          echo "end-to-end OK: rule written, $N indexed, find works"
